name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0  # required for git describe and git rev-list in versioning

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks

      - name: Write Play service account credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > play-service-account.json

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=../release-keystore.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=release"
            echo "keyPassword=$KEY_PASSWORD"
            echo "playServiceAccount=../play-service-account.json"
          } > keystore.properties

      - name: Build signed release APK and upload to Play internal track
        run: |
          ./gradlew assembleRelease publishReleaseBundle
          cp app/build/outputs/apk/release/app-release.apk \
            first-bank-of-pig-${{ inputs.tag || github.ref_name }}.apk

      - name: Create GitHub release
        run: |
          gh release create "${{ inputs.tag || github.ref_name }}" \
            --title "${{ inputs.tag || github.ref_name }}" \
            --generate-notes \
            first-bank-of-pig-${{ inputs.tag || github.ref_name }}.apk
        env:
          GH_TOKEN: ${{ github.token }}
