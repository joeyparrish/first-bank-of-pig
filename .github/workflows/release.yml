name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0  # required for git describe and git rev-list in versioning

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build unsigned release APK
        run: |
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
            first-bank-of-pig-${{ inputs.tag || github.ref_name }}.apk

      - name: Create GitHub release
        run: |
          gh release create "${{ inputs.tag || github.ref_name }}" \
            --title "${{ inputs.tag || github.ref_name }}" \
            --generate-notes \
            first-bank-of-pig-${{ inputs.tag || github.ref_name }}.apk
        env:
          GH_TOKEN: ${{ github.token }}
